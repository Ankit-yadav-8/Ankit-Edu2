<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Rejig GreenLogic</title>
    <!--
      Single-Page-App redirect for GitHub Pages (rafgraph/spa-github-pages).
      Converts the requested deep-link path into a query string and bounces
      to index.html, where a matching snippet restores the real URL so
      React Router can render the right page.
      pathSegmentsToKeep = 1 because the site lives under /Ankit-Edu2/.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
