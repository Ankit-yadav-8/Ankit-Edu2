<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="rsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b3a44"/><stop offset="0.5" stop-color="#2e5b64"/><stop offset="1" stop-color="#1f444b"/>
    </linearGradient>
    <linearGradient id="rmetal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#173036"/><stop offset="1" stop-color="#0c1d22"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#rsky)"/>
  <circle cx="220" cy="200" r="120" fill="#3f757d" opacity="0.45"/>
  <!-- ground -->
  <rect y="640" width="1200" height="160" fill="#0c1d22"/>
  <!-- pipe rack -->
  <g stroke="#2c545c" stroke-width="6" opacity="0.7">
    <line x1="0" y1="600" x2="1200" y2="600"/><line x1="0" y1="620" x2="1200" y2="620"/>
    <line x1="120" y1="600" x2="120" y2="660"/><line x1="360" y1="600" x2="360" y2="660"/>
    <line x1="640" y1="600" x2="640" y2="660"/><line x1="980" y1="600" x2="980" y2="660"/>
  </g>
  <!-- distillation columns -->
  <g fill="url(#rmetal)">
    <rect x="430" y="250" width="64" height="390" rx="8"/>
    <rect x="520" y="180" width="76" height="460" rx="8"/>
    <rect x="630" y="300" width="56" height="340" rx="8"/>
  </g>
  <g stroke="#3a6a72" stroke-width="3" opacity="0.6">
    <line x1="430" y1="320" x2="494" y2="320"/><line x1="430" y1="400" x2="494" y2="400"/><line x1="430" y1="480" x2="494" y2="480"/><line x1="430" y1="560" x2="494" y2="560"/>
    <line x1="520" y1="260" x2="596" y2="260"/><line x1="520" y1="340" x2="596" y2="340"/><line x1="520" y1="420" x2="596" y2="420"/><line x1="520" y1="500" x2="596" y2="500"/><line x1="520" y1="580" x2="596" y2="580"/>
  </g>
  <!-- tops -->
  <rect x="524" y="160" width="68" height="24" rx="6" fill="#0c1d22"/>
  <rect x="434" y="232" width="56" height="22" rx="6" fill="#0c1d22"/>
  <!-- spherical storage tanks -->
  <g fill="#13282e">
    <circle cx="170" cy="560" r="70"/><circle cx="320" cy="575" r="55"/>
  </g>
  <g stroke="#274b52" stroke-width="4" fill="none" opacity="0.5">
    <path d="M100 560 a70 70 0 0 0 140 0"/><path d="M170 490 v140"/>
  </g>
  <!-- flare stack with flame -->
  <rect x="900" y="280" width="20" height="360" fill="#1a363c"/>
  <path d="M910 280 q-26 -40 0 -78 q26 38 0 78 Z" fill="#f4a259"/>
  <path d="M910 268 q-14 -22 0 -44 q14 22 0 44 Z" fill="#ffd27d"/>
  <!-- cooling tower -->
  <path d="M1010 640 L1030 470 Q1075 455 1120 470 L1140 640 Z" fill="#13282e"/>
  <ellipse cx="1075" cy="470" rx="45" ry="12" fill="#0c1d22"/>
</svg>
