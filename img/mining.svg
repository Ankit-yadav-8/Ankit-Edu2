<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="msky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#caa873"/><stop offset="0.55" stop-color="#a87f4c"/><stop offset="1" stop-color="#7c5733"/>
    </linearGradient>
    <linearGradient id="mpit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9b6f3f"/><stop offset="1" stop-color="#5a3d22"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#msky)"/>
  <circle cx="960" cy="180" r="90" fill="#f0d9a8" opacity="0.7"/>
  <!-- distant ridge -->
